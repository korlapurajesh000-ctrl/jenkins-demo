<!DOCTYPE html>
<html>
<head>
  <title>Rajesh Family</title>

  <style>
    body {
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      font-family: Arial;
      text-align: center;
      color: white;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 30px;
      font-size: 50px;
      animation: bounce 2s infinite;
    }

    .card {
      background: rgba(255,255,255,0.2);
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 20px;
      transition: 0.5s;
    }

    .card:hover {
      transform: scale(1.1);
      background: rgba(255,255,255,0.4);
    }

    @keyframes bounce {
      0% {transform: translateY(0);}
      50% {transform: translateY(-10px);}
      100% {transform: translateY(0);}
    }
  </style>
</head>

<body>

<h1>🌟 My Beautiful Family 🌟</h1>

<div class=\"card\">
  <h2>👨 Malleswar Rao</h2>
  <p>Father</p>
</div>

<div class=\"card\">
  <h2>👩 Mangamma</h2>
  <p>Mother</p>
</div>

<div class=\"card\">
  <h2>👩 Gayathri</h2>
  <p>Daughter</p>
</div>

<div class=\"card\">
  <h2>👨 Dhilip Kumar</h2>
  <p>Gayathri Husband</p>
</div>

<div class=\"card\">
  <h2>👧 Lakshita Chodya</h2>
  <p>Child</p>
</div>

<div class=\"card\">
  <h2>👦 Vivan Varshit</h2>
  <p>Child</p>
</div>

<div class=\"card\">
  <h2>🧑‍💻 Rajesh</h2>
  <p>Future DevOps Engineer</p>
</div>

</body>
</html>
